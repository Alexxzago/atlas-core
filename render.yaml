services:
  - type: web
    name: atlas-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: libsql
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ATLAS_VERIFICATION_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
